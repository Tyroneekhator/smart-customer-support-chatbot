services:
  db:
    image: postgres:16-alpine
    container_name: cookiebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cookiebot_db
      POSTGRES_USER: cookiebot_user
      POSTGRES_PASSWORD: cookiebot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookiebot_user -d cookiebot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: cookiebot_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cookiebot_user:cookiebot_password@db:5432/cookiebot_db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123!
      ADMIN_SECRET_KEY: replace-this-before-deployment-with-a-long-random-secret
      ADMIN_ACCESS_TOKEN_EXPIRE_MINUTES: 120
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: cookiebot_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
